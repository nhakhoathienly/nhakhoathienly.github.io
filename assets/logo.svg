<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Gradient màu xanh ngọc sang xanh dương sáng -->
    <linearGradient id="toothGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <!-- Gradient cho nụ cười trẻ thơ -->
    <linearGradient id="smileGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Chiếc răng cách điệu hình trái tim / nụ cười nâng đỡ -->
  <path d="M 50 15 
           C 65 5, 85 10, 85 35 
           C 85 55, 75 70, 70 85 
           C 68 90, 65 92, 60 90
           C 55 88, 52 80, 50 82
           C 48 80, 45 88, 40 90
           C 35 92, 32 90, 30 85
           C 25 70, 15 55, 15 35
           C 15 10, 35 5, 50 15 Z" 
        fill="url(#toothGradient)" />

  <!-- Nụ cười trẻ thơ nằm trên thân răng (Màu trắng ngà tạo nét duyên dáng) -->
  <path d="M 32 45 
           Q 50 62 68 45" 
           fill="none" 
           stroke="#ffffff" 
           stroke-width="5" 
           stroke-linecap="round" />
           
  <!-- Hai má lúm đồng tiền dễ thương -->
  <circle cx="30" cy="43" r="3" fill="#ffffff" opacity="0.9" />
  <circle cx="70" cy="43" r="3" fill="#ffffff" opacity="0.9" />

  <!-- Ngôi sao lấp lánh góc trên bên phải đại diện cho răng khỏe sáng bóng -->
  <path d="M 80 15 L 83 23 L 91 23 L 85 28 L 87 36 L 80 31 L 73 36 L 75 28 L 69 23 L 77 23 Z" 
        fill="#f59e0b" 
        filter="url(#glow)" />
</svg>
